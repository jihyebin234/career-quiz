<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>직업과 진로 암기 퀴즈</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #1f2933;
      --muted: #697586;
      --line: #d8dee8;
      --primary: #1769aa;
      --primary-dark: #0f4f82;
      --accent: #2f7d57;
      --wrong: #ba3b46;
      --right-bg: #e7f5ee;
      --wrong-bg: #f9e7e9;
      --shadow: 0 12px 32px rgba(31, 41, 51, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
    }

    aside {
      background: #102033;
      color: #eef4fb;
      padding: 22px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 22px;
    }

    .brand strong {
      font-size: 22px;
      letter-spacing: 0;
    }

    .brand span {
      color: #b8c7d9;
      font-size: 14px;
    }

    .side-section {
      border-top: 1px solid rgba(255, 255, 255, 0.14);
      padding-top: 18px;
      margin-top: 18px;
    }

    .side-section label {
      display: block;
      color: #cbd6e2;
      font-size: 13px;
      margin-bottom: 8px;
    }

    select,
    input[type="text"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 11px 12px;
      background: #fff;
      color: var(--text);
    }

    .mode-grid,
    .unit-grid {
      display: grid;
      gap: 8px;
    }

    .chip {
      width: 100%;
      min-height: 40px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 6px;
      padding: 9px 10px;
      color: #eef4fb;
      background: rgba(255, 255, 255, 0.06);
      cursor: pointer;
      text-align: left;
    }

    .chip.active {
      background: #e7f0fa;
      color: #102033;
      border-color: #e7f0fa;
      font-weight: 700;
    }

    .side-actions {
      display: grid;
      gap: 8px;
    }

    .ghost {
      min-height: 40px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 6px;
      background: transparent;
      color: #eef4fb;
      cursor: pointer;
    }

    main {
      padding: 28px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .title h1 {
      margin: 0;
      font-size: 26px;
    }

    .title p {
      margin: 4px 0 0;
      color: var(--muted);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(90px, 1fr));
      gap: 10px;
      width: min(520px, 100%);
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      box-shadow: 0 3px 12px rgba(31, 41, 51, 0.04);
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .stat strong {
      display: block;
      font-size: 20px;
      margin-top: 2px;
    }

    .progress {
      height: 10px;
      border-radius: 999px;
      background: #dfe5ed;
      overflow: hidden;
      margin-bottom: 18px;
    }

    .progress div {
      width: 0%;
      height: 100%;
      background: var(--primary);
      transition: width 160ms ease;
    }

    .quiz-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 18px;
      align-items: start;
    }

    .card,
    .review {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .card {
      min-height: 460px;
      padding: 26px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 20px;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .tag {
      border-radius: 999px;
      padding: 5px 9px;
      background: #eef2f7;
      color: #364152;
      font-size: 13px;
      font-weight: 700;
    }

    .question {
      display: grid;
      align-content: center;
      gap: 18px;
    }

    .question h2 {
      margin: 0;
      font-size: 28px;
      line-height: 1.35;
      letter-spacing: 0;
      word-break: keep-all;
    }

    .answer-box {
      display: none;
      border-left: 5px solid var(--accent);
      background: var(--right-bg);
      border-radius: 6px;
      padding: 14px 16px;
      font-size: 20px;
      font-weight: 700;
    }

    .answer-box.show {
      display: block;
    }

    .choices {
      display: grid;
      gap: 10px;
    }

    .choice {
      min-height: 50px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      padding: 12px 14px;
      cursor: pointer;
      text-align: left;
    }

    .choice.correct {
      border-color: var(--accent);
      background: var(--right-bg);
      font-weight: 700;
    }

    .choice.wrong {
      border-color: var(--wrong);
      background: var(--wrong-bg);
      font-weight: 700;
    }

    .text-answer {
      display: grid;
      gap: 10px;
      max-width: 560px;
    }

    .feedback {
      min-height: 28px;
      font-weight: 700;
    }

    .feedback.right {
      color: var(--accent);
    }

    .feedback.wrong {
      color: var(--wrong);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn {
      min-height: 42px;
      border: 1px solid var(--primary);
      border-radius: 6px;
      padding: 10px 14px;
      background: var(--primary);
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }

    .btn:hover {
      background: var(--primary-dark);
    }

    .btn.secondary {
      background: #fff;
      color: var(--primary);
    }

    .btn.secondary:hover {
      background: #edf5fc;
    }

    .btn.warn {
      border-color: var(--wrong);
      background: var(--wrong);
    }

    .review {
      padding: 18px;
      color: var(--text);
      position: static;
      height: auto;
      overflow: visible;
    }

    .review h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .wrong-list {
      display: grid;
      gap: 10px;
      max-height: 530px;
      overflow: auto;
    }

    .wrong-item {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      background: #fbfcfe;
      font-size: 14px;
    }

    .wrong-item strong {
      display: block;
      margin-bottom: 4px;
    }

    .empty {
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 6px;
      padding: 18px;
      text-align: center;
    }

    .finish {
      display: none;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .finish.show {
      display: block;
    }

    .finish h2 {
      margin: 0 0 8px;
      font-size: 26px;
    }

    .finish p {
      color: var(--muted);
      margin: 0 0 18px;
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
      }

      aside {
        position: static;
        height: auto;
      }

      .quiz-layout {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
      }
    }

    @media (max-width: 620px) {
      main {
        padding: 18px;
      }

      .stats {
        grid-template-columns: repeat(2, 1fr);
      }

      .card {
        min-height: 430px;
        padding: 20px;
      }

      .question h2 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand">
        <strong>직업과 진로 퀴즈</strong>
        <span>암기장 기반 복습 프로그램</span>
      </div>

      <div class="side-section">
        <label>학습 모드</label>
        <div class="mode-grid">
          <button class="chip active" data-mode="flash">카드 암기</button>
          <button class="chip" data-mode="choice">객관식</button>
          <button class="chip" data-mode="type">주관식</button>
          <button class="chip" data-mode="ox">OX</button>
        </div>
      </div>

      <div class="side-section">
        <label>범위</label>
        <div class="unit-grid">
          <button class="chip active" data-unit="all">전체</button>
          <button class="chip" data-unit="시험힌트">시험힌트</button>
          <button class="chip" data-unit="1단원">1단원</button>
          <button class="chip" data-unit="2단원">2단원</button>
          <button class="chip" data-unit="3단원">3단원</button>
          <button class="chip" data-unit="wrong">오답만</button>
        </div>
      </div>

      <div class="side-section">
        <label for="countSelect">문제 수</label>
        <select id="countSelect">
          <option value="10">10문제</option>
          <option value="20" selected>20문제</option>
          <option value="30">30문제</option>
          <option value="50">50문제</option>
          <option value="all">가능한 만큼</option>
        </select>
      </div>

      <div class="side-section side-actions">
        <button class="ghost" id="startBtn">새 퀴즈 시작</button>
        <button class="ghost" id="shuffleBtn">현재 문제 섞기</button>
        <button class="ghost" id="resetBtn">기록 초기화</button>
      </div>
    </aside>

    <main>
      <div class="topbar">
        <div class="title">
          <h1 id="pageTitle">카드 암기</h1>
          <p id="pageSubtitle">답을 떠올린 뒤 확인하고, 기억 여부를 표시하세요.</p>
        </div>
        <div class="stats">
          <div class="stat"><span>진행</span><strong id="progressText">0/0</strong></div>
          <div class="stat"><span>정답</span><strong id="rightText">0</strong></div>
          <div class="stat"><span>오답</span><strong id="wrongText">0</strong></div>
          <div class="stat"><span>정답률</span><strong id="rateText">0%</strong></div>
        </div>
      </div>

      <div class="progress" aria-label="진행률">
        <div id="progressBar"></div>
      </div>

      <section class="quiz-layout">
        <div>
          <article class="card" id="quizCard">
            <div class="meta">
              <span class="tag" id="unitTag">전체</span>
              <span class="tag" id="kindTag">암기</span>
              <span class="tag" id="indexTag">1번</span>
            </div>

            <div class="question">
              <h2 id="questionText"></h2>
              <div class="answer-box" id="answerBox"></div>
              <div class="choices" id="choices"></div>
              <div class="text-answer" id="textAnswer">
                <input id="answerInput" type="text" autocomplete="off" placeholder="답을 입력하세요">
                <button class="btn" id="submitTextBtn">확인</button>
              </div>
              <div class="feedback" id="feedback"></div>
            </div>

            <div class="controls">
              <div class="button-row">
                <button class="btn secondary" id="showBtn">답 보기</button>
                <button class="btn" id="knowBtn">기억함</button>
                <button class="btn warn" id="dontKnowBtn">헷갈림</button>
              </div>
              <button class="btn secondary" id="nextBtn">다음</button>
            </div>
          </article>

          <article class="finish" id="finishPanel">
            <h2>퀴즈 완료</h2>
            <p id="finishText"></p>
            <div class="button-row">
              <button class="btn" id="retryWrongBtn">오답 다시 풀기</button>
              <button class="btn secondary" id="restartBtn">같은 조건으로 다시</button>
            </div>
          </article>
        </div>

        <aside class="review">
          <h2>오답 노트</h2>
          <div class="wrong-list" id="wrongList"></div>
        </aside>
      </section>
    </main>
  </div>

  <script>
    const QUESTIONS = [
      { unit: "1단원", kind: "빈칸", q: "일의 3요소는 목적성, 노력과 활동성, _____이다.", a: "가치 창출" },
      { unit: "1단원", kind: "빈칸", q: "직업의 4조건은 계속성, 경제성, 사회성, _____이다.", a: "윤리성" },
      { unit: "1단원", kind: "빈칸", q: "직업 선택의 기준이 되는 개인의 인식, 태도, 도덕관을 _____이라고 한다.", a: "직업 가치관" },
      { unit: "1단원", kind: "빈칸", q: "보수, 명예, 지위처럼 외부에서 얻는 가치를 중시하는 것은 _____ 직업 가치관이다.", a: "외적" },
      { unit: "1단원", kind: "빈칸", q: "즐거움, 보람, 창의성처럼 일을 통해 얻는 정신적 가치를 중시하는 것은 _____ 직업 가치관이다.", a: "내적" },
      { unit: "1단원", kind: "OX", q: "보수가 없으면 일이라고 할 수 없다.", a: "X" },
      { unit: "1단원", kind: "OX", q: "취미 활동도 기술 연마, 완성, 자아실현이 포함되면 일로 볼 수 있다.", a: "O" },
      { unit: "1단원", kind: "OX", q: "무보수 가사 활동은 직업의 경제성이 부족하다.", a: "O" },
      { unit: "1단원", kind: "OX", q: "직업의 심리적 역할에는 능력 인정과 적성 발휘가 포함된다.", a: "O" },
      { unit: "1단원", kind: "빈칸", q: "집에서 업무를 수행하는 근무 형태는 _____이다.", a: "재택근무" },
      { unit: "1단원", kind: "빈칸", q: "사무실 외 다른 공간에서 일하는 근무 형태는 _____이다.", a: "원격근무" },
      { unit: "1단원", kind: "빈칸", q: "성수기와 비수기처럼 업무량 차이를 평균 내어 운영하는 제도는 _____이다.", a: "탄력근무제" },
      { unit: "1단원", kind: "빈칸", q: "초과 근무 시간을 적립했다가 나중에 휴가로 사용하는 제도는 _____이다.", a: "근무 시간 계좌제" },
      { unit: "1단원", kind: "빈칸", q: "출산휴가는 출산 전후 총 _____일이다.", a: "90일" },
      { unit: "1단원", kind: "단답", q: "재택근무와 원격근무의 핵심 차이는?", a: "재택은 집, 원격은 사무실 외 장소 전체" },
      { unit: "1단원", kind: "단답", q: "탄력근무제와 선택적 근로시간제의 핵심 차이는?", a: "탄력은 업무량에 따른 시간 조정, 선택적은 출퇴근 시각 선택" },
      { unit: "1단원", kind: "단답", q: "집약근무제와 근무 시간 계좌제의 핵심 차이는?", a: "집약은 근무 일수 단축, 계좌제는 초과근무 저축" },
      { unit: "1단원", kind: "빈칸", q: "청소년기의 주요 발달 과업은 자아 정체감 확립과 _____이다.", a: "진로 탐색" },
      { unit: "1단원", kind: "빈칸", q: "슈퍼 이론에서 14~24세는 _____기이다.", a: "탐색기" },
      { unit: "1단원", kind: "빈칸", q: "슈퍼 이론에서 25~44세는 _____기이다.", a: "확립기" },
      { unit: "1단원", kind: "빈칸", q: "매슬로 욕구 5단계의 가장 높은 단계는 _____ 욕구이다.", a: "자아실현" },
      { unit: "1단원", kind: "빈칸", q: "성별, 혈연, 신분 등 선천적 배경으로 직업이 결정된다는 직업관은 _____ 직업관이다.", a: "귀속주의적" },
      { unit: "1단원", kind: "단답", q: "슈퍼의 진로 발달 이론 5단계를 순서대로 쓰세요.", a: "성장기, 탐색기, 확립기, 유지기, 쇠퇴기" },
      { unit: "1단원", kind: "단답", q: "매슬로 욕구 5단계를 낮은 단계부터 순서대로 쓰세요.", a: "생리적, 안전, 사회적, 자존, 자아실현" },
      { unit: "1단원", kind: "단답", q: "일의 3요소는?", a: "목적성, 노력과 활동성, 가치 창출" },
      { unit: "1단원", kind: "단답", q: "직업의 역할 3가지는?", a: "경제적, 사회적, 심리적" },

      { unit: "2단원", kind: "빈칸", q: "합명 회사의 사원은 회사 채무에 대해 _____ 책임을 진다.", a: "무한 연대" },
      { unit: "2단원", kind: "빈칸", q: "합자 회사는 _____ 책임 사원과 _____ 책임 사원으로 구성된다.", a: "무한, 유한" },
      { unit: "2단원", kind: "빈칸", q: "주식회사의 주주는 자신이 산 주식만큼만 책임지는 _____ 책임을 진다.", a: "유한" },
      { unit: "2단원", kind: "빈칸", q: "주식회사의 특징 중 주주와 전문 경영인의 역할이 나뉘는 것을 _____라고 한다.", a: "소유와 경영의 분리" },
      { unit: "2단원", kind: "빈칸", q: "협동조합은 출자액과 관계없이 _____ 원칙을 따른다.", a: "1인 1표" },
      { unit: "2단원", kind: "빈칸", q: "경영 관리 순환 과정은 계획, 조직, 지휘, _____이다.", a: "통제" },
      { unit: "2단원", kind: "단답", q: "기업의 경제적 목적은?", a: "비용 최소화, 이윤 극대화" },
      { unit: "2단원", kind: "단답", q: "기업의 역할 3가지는?", a: "생산 활동, 일자리 창출, 국가 발전 기여" },

      current: 0,

      answered: false,

    function withIds(items) {
      return items.map((item, index) => ({ ...item, id: index }));
    }

    const DATA = withIds(QUESTIONS);

    function loadWrongIds() {
      try {
        return JSON.parse(localStorage.getItem("careerQuizWrongIds") || "[]");
      } catch {
        return [];
      }
    }

    function saveWrongIds() {
      localStorage.setItem("careerQuizWrongIds", JSON.stringify([...new Set(state.wrongIds)]));
    }

    function normalize(text) {
      return String(text)
        .toLowerCase()
        .replace(/\s+/g, "")
        .replace(/[,.+·ㆍ/()]/g, "");
    }

    function shuffle(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function getPool() {
      let pool = DATA;
      if (state.unit === "wrong") {
        pool = DATA.filter(item => state.wrongIds.includes(item.id));
      } else if (state.unit !== "all") {
        pool = DATA.filter(item => item.unit === state.unit);
      }
      if (state.mode === "ox") {
        pool = pool.filter(item => item.kind === "OX");
      }
      return pool;
    }

    function buildQuiz() {
      const pool = shuffle(getPool());
      const count = els.countSelect.value === "all" ? pool.length : Number(els.countSelect.value);
      state.activeQuestions = pool.slice(0, count);
      state.current = 0;
      state.right = 0;
      state.wrong = 0;
      state.answered = false;
      updateModeText();
      renderWrongList();
      renderQuestion();
    }

    function updateModeText() {
      const titles = {
        flash: ["카드 암기", "답을 떠올린 뒤 확인하고, 기억 여부를 표시하세요."],
        choice: ["객관식", "보기 중 가장 알맞은 답을 고르세요."],
        type: ["주관식", "답을 입력한 뒤 확인하세요. 띄어쓰기와 일부 기호는 느슨하게 채점합니다."],
        ox: ["OX", "문장을 읽고 O 또는 X를 고르세요."]
      };
      els.pageTitle.textContent = titles[state.mode][0];
      els.pageSubtitle.textContent = titles[state.mode][1];
    }

    function renderQuestion() {
      els.finishPanel.classList.remove("show");
      els.quizCard.style.display = "grid";

      if (state.activeQuestions.length === 0) {
        showEmpty();
        return;
      }

      if (state.current >= state.activeQuestions.length) {
        showFinish();
        return;
      }

      const item = state.activeQuestions[state.current];
      state.answered = false;
      els.unitTag.textContent = item.unit;
      els.kindTag.textContent = item.kind;
      els.indexTag.textContent = `${state.current + 1}번`;
      els.questionText.textContent = item.q;
      els.answerBox.textContent = `정답: ${item.a}`;
      els.answerBox.classList.remove("show");
      els.feedback.textContent = "";
      els.feedback.className = "feedback";
      els.choices.innerHTML = "";
      els.answerInput.value = "";
      setControlVisibility();
      updateStats();

      if (state.mode === "choice") {
        renderChoices(item);
      } else if (state.mode === "ox") {
        renderOx(item);
      } else if (state.mode === "type") {
        setTimeout(() => els.answerInput.focus(), 0);
      }
    }

    function showEmpty() {
      els.questionText.textContent = state.unit === "wrong"
        ? "아직 오답 노트에 문제가 없습니다."
        : "선택한 조건에 맞는 문제가 없습니다.";
      els.unitTag.textContent = "빈 목록";
      els.kindTag.textContent = "-";
      els.indexTag.textContent = "0번";
      els.answerBox.classList.remove("show");
      els.choices.innerHTML = "";
      els.textAnswer.style.display = "none";
      els.showBtn.style.display = "none";
      els.knowBtn.style.display = "none";
      els.dontKnowBtn.style.display = "none";
      els.nextBtn.style.display = "none";
      updateStats();
    }

    function showFinish() {
      const total = state.right + state.wrong;
      const rate = total ? Math.round((state.right / total) * 100) : 0;
      els.quizCard.style.display = "none";
      els.finishPanel.classList.add("show");
      els.finishText.textContent = `총 ${total}문제 중 ${state.right}개를 맞혔고, 정답률은 ${rate}%입니다.`;
      updateStats(true);
      renderWrongList();
    }

    function setControlVisibility() {
      const isFlash = state.mode === "flash";
      const isType = state.mode === "type";
      els.textAnswer.style.display = isType ? "grid" : "none";
      els.showBtn.style.display = isFlash || isType ? "inline-block" : "none";
      els.knowBtn.style.display = isFlash ? "inline-block" : "none";
      els.dontKnowBtn.style.display = isFlash ? "inline-block" : "none";
      els.nextBtn.style.display = isFlash ? "none" : "inline-block";
      els.nextBtn.disabled = state.mode !== "flash" && !state.answered;
    }

    function renderChoices(item) {
      const wrongAnswers = shuffle(DATA.filter(q => q.a !== item.a).map(q => q.a)).slice(0, 3);
      const options = shuffle([item.a, ...wrongAnswers]);
      options.forEach(option => {
        const button = document.createElement("button");
        button.className = "choice";
        button.textContent = option;
        button.addEventListener("click", () => chooseAnswer(button, option, item));
        els.choices.appendChild(button);
      });
    }

    function renderOx(item) {
      ["O", "X"].forEach(option => {
        const button = document.createElement("button");
        button.className = "choice";
        button.textContent = option;
        button.addEventListener("click", () => chooseAnswer(button, option, item));
        els.choices.appendChild(button);
      });
    }

    function chooseAnswer(button, option, item) {
      if (state.answered) return;
      const correct = option === item.a;
      [...els.choices.children].forEach(child => {
        if (child.textContent === item.a) child.classList.add("correct");
      });
      if (!correct) button.classList.add("wrong");
      mark(correct, item);
      els.feedback.textContent = correct ? "정답입니다." : `오답입니다. 정답은 ${item.a}`;
      els.feedback.classList.add(correct ? "right" : "wrong");
      els.answerBox.classList.add("show");
      els.nextBtn.disabled = false;
    }

    function submitTypedAnswer() {
      if (state.answered || state.current >= state.activeQuestions.length) return;
      const item = state.activeQuestions[state.current];
      const user = els.answerInput.value.trim();
      if (!user) {
        els.feedback.textContent = "답을 입력해 주세요.";
        els.feedback.className = "feedback wrong";
        return;
      }
      const correct = normalize(user) === normalize(item.a) || normalize(item.a).includes(normalize(user));
      mark(correct, item);
      els.feedback.textContent = correct ? "정답입니다." : `오답입니다. 정답은 ${item.a}`;
      els.feedback.className = `feedback ${correct ? "right" : "wrong"}`;
      els.answerBox.classList.add("show");
      els.nextBtn.disabled = false;
    }

    function showAnswer() {
      if (state.current >= state.activeQuestions.length) return;
      els.answerBox.classList.add("show");
      if (state.mode !== "type" || state.answered) return;
      const item = state.activeQuestions[state.current];
      mark(false, item);
      els.feedback.textContent = "답을 확인해서 오답 노트에 저장했습니다.";
      els.feedback.className = "feedback wrong";
      els.nextBtn.disabled = false;
    }

    function mark(correct, item) {
      if (state.answered) return;
      state.answered = true;
      if (correct) {
        state.right += 1;
        state.wrongIds = state.wrongIds.filter(id => id !== item.id);
      } else {
        state.wrong += 1;
        state.wrongIds.push(item.id);
      }
      state.wrongIds = [...new Set(state.wrongIds)];
      saveWrongIds();
      updateStats();
      renderWrongList();
    }

    function markFlash(correct) {
      if (state.current >= state.activeQuestions.length) return;
      mark(correct, state.activeQuestions[state.current]);
      nextQuestion();
    }

    function nextQuestion() {
      if (state.mode !== "flash" && !state.answered) return;
      state.current += 1;
      renderQuestion();
    }

    function updateStats(finished = false) {
      const total = state.activeQuestions.length;
      const done = finished ? total : Math.min(state.current, total);
      const answeredTotal = state.right + state.wrong;
      const rate = answeredTotal ? Math.round((state.right / answeredTotal) * 100) : 0;
      els.progressText.textContent = `${done}/${total}`;
      els.rightText.textContent = state.right;
      els.wrongText.textContent = state.wrong;
      els.rateText.textContent = `${rate}%`;
      els.progressBar.style.width = total ? `${(done / total) * 100}%` : "0%";
    }

    function renderWrongList() {
      const wrongItems = DATA.filter(item => state.wrongIds.includes(item.id));
      els.wrongList.innerHTML = "";
      if (wrongItems.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "아직 저장된 오답이 없습니다.";
        els.wrongList.appendChild(empty);
        return;
      }
      wrongItems.forEach(item => {
        const div = document.createElement("div");
        div.className = "wrong-item";
        div.innerHTML = `<strong>${escapeHtml(item.q)}</strong><span>정답: ${escapeHtml(item.a)}</span>`;
        els.wrongList.appendChild(div);
      });
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    els.modeButtons.forEach(button => {
      button.addEventListener("click", () => {
        els.modeButtons.forEach(btn => btn.classList.remove("active"));
        button.classList.add("active");
        state.mode = button.dataset.mode;
        buildQuiz();
      });
    });

    els.unitButtons.forEach(button => {
      button.addEventListener("click", () => {
        els.unitButtons.forEach(btn => btn.classList.remove("active"));
        button.classList.add("active");
        state.unit = button.dataset.unit;
        buildQuiz();
      });
    });

    els.startBtn.addEventListener("click", buildQuiz);
    els.shuffleBtn.addEventListener("click", () => {
      state.activeQuestions = shuffle(state.activeQuestions);
      state.current = 0;
      state.right = 0;
      state.wrong = 0;
      renderQuestion();
    });
    els.resetBtn.addEventListener("click", () => {
      if (!confirm("오답 기록을 모두 지울까요?")) return;
      state.wrongIds = [];
      saveWrongIds();
      renderWrongList();
      if (state.unit === "wrong") buildQuiz();
    });
    els.showBtn.addEventListener("click", showAnswer);
    els.knowBtn.addEventListener("click", () => markFlash(true));
    els.dontKnowBtn.addEventListener("click", () => markFlash(false));
    els.nextBtn.addEventListener("click", nextQuestion);
    els.submitTextBtn.addEventListener("click", submitTypedAnswer);
    els.answerInput.addEventListener("keydown", event => {
      if (event.key === "Enter") submitTypedAnswer();
    });
    els.retryWrongBtn.addEventListener("click", () => {
      state.unit = "wrong";
      els.unitButtons.forEach(btn => btn.classList.toggle("active", btn.dataset.unit === "wrong"));
      buildQuiz();
    });
    els.restartBtn.addEventListener("click", buildQuiz);

    buildQuiz();
  </script>
</body>
</html>
